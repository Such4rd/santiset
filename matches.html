<!doctype html><html lang="es"><head><link rel="icon" type="image/png" href="assets/images/logo-santiset-round.png"><link rel="apple-touch-icon" href="assets/images/logo-santiset-round.png"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mis partidos · SantiSet</title><link rel="stylesheet" href="css/styles.css"><link rel="stylesheet" href="css/dashboard.css"></head><body><main class="app"><header class="top"><div class="brand-logo-wrap"><img class="app-logo small" src="assets/images/logo-santiset-round.png" alt="SantiSet"><div class="brand-logo-stack"><div class="brand">Mis partidos</div><div class="subtitle">Gestiona partidos, sets, vídeos y exportaciones</div></div></div><button id="newMatch" class="btn primary">+ Partido</button></header><input id="search" class="field" placeholder="Buscar partido..."><section id="matches"></section>
<dialog id="matchDialog" class="sheet-dialog"><form id="matchForm" method="dialog" class="sheet-card"><div class="sheet-head"><strong id="matchDialogTitle">Partido</strong><button type="button" class="sheet-close" data-close="matchDialog">×</button></div><input type="hidden" name="id"><label>Pareja rival<input name="rival_name" class="field" autocomplete="off"></label><label>Compañero<input name="partner_name" class="field" autocomplete="off"></label><div class="form-grid"><label>Tipo partido<select name="match_type" class="field"><option value="amistoso">Amistoso</option><option value="entrenamiento">Entrenamiento</option><option value="competicion">Competición</option><option value="torneo">Torneo</option></select></label><label>Tipo pista<select name="court_type" class="field"><option value="indoor">Indoor</option><option value="outdoor">Outdoor</option><option value="moqueta">Moqueta</option><option value="muro">Muro</option><option value="cristal">Cristal</option></select></label></div><label>Lugar<input name="location" class="field" autocomplete="off"></label><label>Fecha<input name="date" type="datetime-local" class="field"></label><label>Enlace YouTube<input name="video_url" class="field" autocomplete="off" placeholder="https://youtu.be/..."></label><label>Notas<textarea name="notes" class="field" rows="3"></textarea></label><button class="primary" value="default">Guardar partido</button></form></dialog>
<dialog id="setVideoDialog" class="sheet-dialog"><form id="setVideoForm" method="dialog" class="sheet-card"><div class="sheet-head"><strong>Vídeo del set</strong><button type="button" class="sheet-close" data-close="setVideoDialog">×</button></div><input type="hidden" name="set_id"><p class="small">Cada set puede tener su propio enlace de YouTube.</p><label>Enlace YouTube del set<input name="video_url" class="field" autocomplete="off" placeholder="https://youtu.be/..."></label><button class="primary" value="default">Guardar vídeo</button></form></dialog>
<dialog id="infoDialog" class="sheet-dialog"><div class="sheet-card"><div class="sheet-head"><strong>Información del partido</strong><button type="button" class="sheet-close" data-close="infoDialog">×</button></div><div id="infoContent" class="info-list"></div></div></dialog>
<dialog id="pdfPreviewDialog" class="sheet-dialog pdf-preview-dialog"><div class="sheet-card pdf-preview-card"><div class="sheet-head"><strong>Vista previa PDF</strong><button type="button" class="sheet-close" data-close="pdfPreviewDialog">×</button></div><div id="pdfPreviewContent"></div><button id="confirmPDFExport" class="primary">Descargar PDF</button></div></dialog></main><script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script><script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script><script type="module" src="js/matches.js"></script></body></html>
